name: Security

# =============================================================================
# Defence-in-depth SAST/SCA pipeline. Runs on every push to main plus nightly.
# Each tool addresses a distinct class of risk — redundancy is intentional.
#
# Security note on action pinning:
#   Following the March 2026 supply-chain attack against aquasecurity/trivy-action
#   (75 tags force-pushed to malicious commits), third-party scanning actions are
#   pinned to immutable commit SHAs rather than mutable tags. A tag can be
#   re-pointed; a SHA is cryptographically immutable. Comment above each pin
#   records the human-readable version for readability.
# =============================================================================
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Nightly scan: dependency DBs are updated daily — a past-clean repo can
    # become vulnerable overnight without any code change.
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write   # Required to upload SARIF to the Security tab.
  actions: read

jobs:
  # ---------------------------------------------------------------------------
  # Static filesystem scan — finds vulnerable OSS deps without building images.
  # ---------------------------------------------------------------------------
  trivy-fs:
    name: Trivy — filesystem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy FS scan
        # aquasecurity/trivy-action v0.35.0 — SHA pin for supply-chain safety.
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          exit-code: '0'   # Report only — don't break the pipeline on findings.

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ---------------------------------------------------------------------------
  # Secret detection — catches keys/passwords accidentally committed to git.
  # ---------------------------------------------------------------------------
  gitleaks:
    name: Gitleaks — secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history required to scan past commits too.

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE only needed for private repos > free tier; omit for public.

  # ---------------------------------------------------------------------------
  # OWASP Dependency-Check — cross-references Gradle deps against NVD.
  # Runs inside its own Docker container with bundled Java, so no setup-java
  # step is needed (and any prior JAVA_HOME pollution can confuse the action).
  # ---------------------------------------------------------------------------
  dependency-check:
    name: OWASP Dependency-Check (back)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Cache Dependency-Check DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/dependency-check
          key: ${{ runner.os }}-depcheck-${{ hashFiles('back/**/*.gradle') }}
          restore-keys: ${{ runner.os }}-depcheck-

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        env:
          # NVD API key is read natively by the action from this env var —
          # safer than passing it via args (no risk of exposure in logs).
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        with:
          project: orion-microcrm-back
          path: back
          format: SARIF
          out: reports
          args: >
            --enableRetired
            --failOnCVSS 9

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          # Dependency-Check writes to dependency-check-report.sarif inside `out:`
          sarif_file: reports/dependency-check-report.sarif
          category: dependency-check

      - name: Archive full report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: reports
          retention-days: 30

  # ---------------------------------------------------------------------------
  # IaC / container misconfiguration — static analysis of Dockerfiles + compose.
  # ---------------------------------------------------------------------------
  checkov:
    name: Checkov — IaC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: dockerfile,yaml,github_actions
          output_format: sarif
          output_file_path: checkov-report
          soft_fail: true   # Report as advisory; tighten over time.

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov-report/results_sarif.sarif
          category: checkov

  # ---------------------------------------------------------------------------
  # Image scan — builds both images locally, then scans them for OS-level CVEs
  # that source-only scanners miss (Ubuntu, Nginx, JRE base layers).
  # ---------------------------------------------------------------------------
  trivy-image:
    name: Trivy — container images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: back
            context: ./back
            image: orion-microcrm-back:scan
          - name: front
            context: ./front
            image: orion-microcrm-front:scan
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image (local only)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          load: true
          tags: ${{ matrix.image }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

      - name: Trivy image scan — ${{ matrix.name }}
        # Same SHA pin as trivy-fs.
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ${{ matrix.image }}
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-${{ matrix.name }}
