name: Security

# =============================================================================
# Defence-in-depth SAST/SCA pipeline. Runs on every push to main plus nightly.
# Each tool addresses a distinct class of risk — redundancy is intentional.
#   - Trivy (filesystem) .......... known-CVE scan on source deps + IaC
#   - Trivy (image) ............... scan of built container images
#   - Gitleaks .................... secret-detection in git history
#   - OWASP Dependency-Check ...... Java dep CVEs (NVD cross-check)
#   - Checkov ..................... Dockerfile / compose misconfigurations
#
# All scans emit SARIF when possible; SARIF is uploaded to the GitHub
# Security tab for triage and trend tracking.
# =============================================================================
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Nightly scan: dependency DBs are updated daily — a past-clean repo can
    # become vulnerable overnight without any code change.
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write   # Required to upload SARIF to the Security tab.
  actions: read

jobs:
  # ---------------------------------------------------------------------------
  # Static filesystem scan — finds vulnerable OSS deps without building images.
  # ---------------------------------------------------------------------------
  trivy-fs:
    name: Trivy — filesystem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy FS scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          exit-code: '0'   # Report only — don't break the pipeline on findings.

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ---------------------------------------------------------------------------
  # Secret detection — catches keys/passwords accidentally committed to git.
  # ---------------------------------------------------------------------------
  gitleaks:
    name: Gitleaks — secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history required to scan past commits too.

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE only needed for private repos > free tier; omit for public.

  # ---------------------------------------------------------------------------
  # OWASP Dependency-Check — cross-references Gradle deps against NVD.
  # Complements Trivy: different data sources, different false-positive profiles.
  # ---------------------------------------------------------------------------
  dependency-check:
    name: OWASP Dependency-Check (back)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Cache Dependency-Check DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/dependency-check
          key: ${{ runner.os }}-depcheck-${{ hashFiles('back/**/*.gradle') }}
          restore-keys: ${{ runner.os }}-depcheck-

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: orion-microcrm-back
          path: back
          format: SARIF
          out: dep-check-report
          # NVD API key avoids aggressive rate limits — create one for free.
          args: >
            --enableRetired
            --failOnCVSS 9
            --nvdApiKey ${{ secrets.NVD_API_KEY }}

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: dep-check-report/dependency-check-report.sarif
          category: dependency-check

      - name: Archive full report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: dep-check-report
          retention-days: 30

  # ---------------------------------------------------------------------------
  # IaC / container misconfiguration — static analysis of Dockerfiles + compose.
  # ---------------------------------------------------------------------------
  checkov:
    name: Checkov — IaC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: dockerfile,docker_compose,github_actions
          output_format: sarif
          output_file_path: checkov-report
          soft_fail: true   # Report as advisory; tighten over time.

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-report/results_sarif.sarif
          category: checkov

  # ---------------------------------------------------------------------------
  # Image scan — runs after images are built. Reuses the docker-build workflow.
  # This job builds locally (not pushed) just to scan; the "real" build+push
  # happens in docker-build.yml on main.
  # ---------------------------------------------------------------------------
  trivy-image:
    name: Trivy — container images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: back
            context: ./back
            image: orion-microcrm-back:scan
          - name: front
            context: ./front
            image: orion-microcrm-front:scan
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image (local only)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          load: true
          tags: ${{ matrix.image }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

      - name: Trivy image scan — ${{ matrix.name }}
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ matrix.image }}
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-${{ matrix.name }}
