# =============================================================================
# SonarCloud configuration — Backend (Spring Boot / Java 17)
# =============================================================================
# The CI workflow passes SONAR_TOKEN via environment variable;
# no secret lives in this file.
# =============================================================================

sonar.organization=guillaumesadleroc
sonar.projectKey=guillaumesadleroc_orion-microcrm-back
sonar.projectName=Orion MicroCRM — Back
sonar.projectVersion=1.0

# Analysis scope ------------------------------------------------------------
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.sourceEncoding=UTF-8

# Java specifics ------------------------------------------------------------
sonar.java.source=17
sonar.java.binaries=build/classes/java/main
sonar.java.test.binaries=build/classes/java/test
sonar.java.libraries=build/libs/*.jar

# Coverage (produced by `./gradlew jacocoTestReport`) -----------------------
sonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml
sonar.junit.reportPaths=build/test-results/test

# Hygiene -------------------------------------------------------------------
sonar.exclusions=**/build/**,**/*.gradle,**/gradle/wrapper/**
