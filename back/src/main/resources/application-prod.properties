# =============================================================================
# Production profile — loaded when SPRING_PROFILES_ACTIVE=prod
# =============================================================================
# DO NOT put secrets here. Values come from environment variables populated by
# docker-compose from the .env file (or from CI/CD secrets on the runner).
# =============================================================================

spring.application.name=microcrm

# --- Datasource (PostgreSQL) -------------------------------------------------
# Host/port/db/user/pass are injected by docker-compose. The driver is only on
# the classpath when the prod profile is active (see runtimeOnly in Gradle).
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:microcrm}
spring.datasource.username=${DB_USER:microcrm}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP sizing — conservative defaults fit a small VPS.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# --- JPA / Hibernate ---------------------------------------------------------
# `validate` is the only safe mode in prod. Schema changes must go through
# versioned migrations (Flyway/Liquibase) — flagged as tech debt in the doc.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# --- Actuator — only health/info exposed, management.server.port isolates ----
# the probe endpoint from the business API so it can be firewalled off.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.show-components=never
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# --- Server hardening --------------------------------------------------------
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true

# --- Logging -----------------------------------------------------------------
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=WARN