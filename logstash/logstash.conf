# =============================================================================
# Logstash pipeline — minimal configuration for the P9 project.
#
# Input : Filebeat (Docker container logs, forwarded via Beats protocol).
# Filter: parse the JSON payload inside the Docker log envelope (Filebeat
#         stores it under the "log" field). Promote ECS fields useful to
#         Kibana to top-level aliases for simple filtering.
# Output: indexed in Elasticsearch as one index per day for easy rotation.
# =============================================================================

input {
  beats {
    port => 5044
  }
}

filter {
  # Filebeat stores the actual log line in the "log" field. Older setups or
  # direct TCP senders may use "message" — we handle both.
  if [log] =~ /^\{/ {
    json {
      source => "log"
      target => "app"
      skip_on_invalid_json => true
    }
  } else if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "app"
      skip_on_invalid_json => true
    }
  }

  # Promote useful ECS fields to top-level aliases (Kibana filters more simply
  # on 'log_level:ERROR' than on '[app][log.level]:ERROR').
  if [app][log.level] {
    mutate { add_field => { "log_level" => "%{[app][log.level]}" } }
  }
  if [app][log.logger] {
    mutate { add_field => { "logger_name" => "%{[app][log.logger]}" } }
  }
  if [app][service.name] {
    mutate { add_field => { "service_name" => "%{[app][service.name]}" } }
  }

  # Tag events by originating container for back/front filtering in Kibana.
  if [container][name] =~ /orion-microcrm-back/ {
    mutate { add_tag => ["app:back"] }
  }
  if [container][name] =~ /orion-microcrm-front/ {
    mutate { add_tag => ["app:front"] }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "orion-microcrm-%{+YYYY.MM.dd}"
  }
}
