# =============================================================================
# Logstash pipeline — minimal configuration for the P9 project.
#
# Input:  Filebeat (Docker container logs, forwarded via Beats protocol).
# Filter: parse the JSON payload that Spring Boot emits on stdout (one JSON
#         object per line, Elastic Common Schema format).
# Output: index in Elasticsearch under one index per day for easy rotation.
# =============================================================================

input {
  beats {
    port => 5044
  }
}

filter {
  # The application log line is a JSON object under the "message" field.
  # Parse it and promote its keys to top-level fields.
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "app"
      skip_on_invalid_json => true
    }
  }

  # Promote the application log level to a top-level "log_level" field so
  # Kibana can filter on "log_level:ERROR" without a nested lookup.
  if [app][log.level] {
    mutate {
      copy => { "[app][log.level]" => "log_level" }
    }
  }

  # Tag logs originating from our two app containers so Kibana can split the
  # dashboards cleanly (back vs. front).
  if [container][name] =~ /orion-microcrm-back/ {
    mutate { add_tag => ["app:back"] }
  }
  if [container][name] =~ /orion-microcrm-front/ {
    mutate { add_tag => ["app:front"] }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "orion-microcrm-%{+YYYY.MM.dd}"
  }
}
