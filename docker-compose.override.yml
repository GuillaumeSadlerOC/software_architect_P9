# =============================================================================
# Dev override — automatically merged on `docker compose up` (no -f flag).
# Purpose: local developer convenience. NEVER used in production.
# =============================================================================
services:

  # ---- Back: switch to HSQLDB (default Spring profile), drop DB dependency
  back:
    environment:
      SPRING_PROFILES_ACTIVE: default
    depends_on: !reset []
    read_only: false

  # ---- Postgres: opt-in only via `docker compose --profile with-postgres up`
  postgres:
    profiles: ["with-postgres"]

  # ---- Front: keep writable FS for dev debug (overlay mounts, etc.)
  front:
    read_only: false

  # ---- Traefik: insecure dashboard on 8090, port 80 → 8000 to avoid host clashes
  traefik:
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --accesslog=true
      - --log.level=DEBUG
      - --api.dashboard=true
      - --api.insecure=true   # dashboard reachable without auth — DEV ONLY
    ports: !override
      - "${HTTP_PORT:-8000}:80"
      - "${TRAEFIK_DASHBOARD_PORT:-8090}:8080"
