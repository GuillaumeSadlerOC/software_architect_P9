# =============================================================================
# SonarCloud configuration — Frontend (Angular 17 / TypeScript)
# =============================================================================
# The CI workflow passes SONAR_TOKEN via environment variable;
# no secret lives in this file.
# =============================================================================

sonar.organization=guillaumesadleroc
sonar.projectKey=guillaumesadleroc_orion-microcrm-front
sonar.projectName=Orion MicroCRM — Front
sonar.projectVersion=1.0

# Analysis scope ------------------------------------------------------------
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.spec.ts
sonar.sourceEncoding=UTF-8

# TypeScript specifics ------------------------------------------------------
sonar.typescript.tsconfigPath=tsconfig.json

# Coverage (produced by `ng test --code-coverage`) --------------------------
sonar.javascript.lcov.reportPaths=coverage/microcrm/lcov.info
sonar.typescript.lcov.reportPaths=coverage/microcrm/lcov.info
