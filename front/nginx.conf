# =============================================================================
# MicroCRM frontend — Nginx configuration (nginx-unprivileged, port 8080)
# =============================================================================
server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # --- Security headers ---------------------------------------------------
    # Defence-in-depth: these headers mitigate XSS, clickjacking, MIME sniffing,
    # and referrer leakage even though the app itself has no auth in this demo.
    add_header X-Frame-Options           "DENY"                         always;
    add_header X-Content-Type-Options    "nosniff"                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    # CSP is intentionally restrictive; 'unsafe-inline' on styles is tolerated
    # because Angular injects some inline styles. Revisit when we adopt nonces.
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' http://localhost:8080; font-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    # --- Performance --------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Long-cache immutable, hashed assets (Angular outputHashing=all).
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|svg|ico)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: every unknown path returns index.html, Angular Router does the rest.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Do not expose Nginx version in error pages / response headers.
    server_tokens off;
}